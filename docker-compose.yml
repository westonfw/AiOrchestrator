services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_orchestrator
      POSTGRES_USER: ai_orch
      POSTGRES_PASSWORD: ai_orch_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_orch -d ai_orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ai_orch
      RABBITMQ_DEFAULT_PASS: ai_orch_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5073:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__UseInMemory: "false"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=ai_orchestrator;Username=ai_orch;Password=ai_orch_secret"
      RabbitMq__Enabled: "true"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ai_orch
      RabbitMq__Password: ai_orch_secret
      Llm__Provider: "${LLM_PROVIDER:-OpenAICompatible}"
      Llm__BaseUrl: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      Llm__ApiKey: "${LLM_API_KEY}"
      Llm__DefaultModel: "${LLM_DEFAULT_MODEL:-gpt-4.1-mini}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/tasks > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DOTNET_ENVIRONMENT: Production
      Database__UseInMemory: "false"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=ai_orchestrator;Username=ai_orch;Password=ai_orch_secret"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ai_orch
      RabbitMq__Password: ai_orch_secret
      Llm__Provider: "${LLM_PROVIDER:-OpenAICompatible}"
      Llm__BaseUrl: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      Llm__ApiKey: "${LLM_API_KEY}"
      Llm__DefaultModel: "${LLM_DEFAULT_MODEL:-gpt-4.1-mini}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
