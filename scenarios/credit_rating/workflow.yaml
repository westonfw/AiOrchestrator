code: credit_rating_report
name: 信评报告生成流程
version: 0.1.0
scenario: credit_rating

input_schema:
  company_name: string
  period: string
  report_type: string
  materials_text: string

steps:
  - id: resolve_company
    name: 公司主体识别
    type: skill
    skill: company_resolution

  - id: collect_materials
    name: 收集任务资料
    type: skill
    skill: collect_materials
    depends_on:
      - resolve_company

  - id: extract_basic_facts
    name: 提取基础事实
    type: skill
    skill: extract_basic_facts
    depends_on:
      - collect_materials

  - id: calculate_financial_ratios
    name: 计算财务指标
    type: skill
    skill: calculate_financial_ratios
    depends_on:
      - extract_basic_facts

  - id: financial_analysis
    name: 财务分析
    type: agent
    agent: financial_analyst
    depends_on:
      - calculate_financial_ratios
    output_schema: schemas/financial_analysis.schema.json

  - id: industry_analysis
    name: 行业分析
    type: agent
    agent: industry_analyst
    depends_on:
      - extract_basic_facts
    output_schema: schemas/industry_analysis.schema.json

  - id: risk_analysis
    name: 风险分析
    type: agent
    agent: risk_analyst
    depends_on:
      - financial_analysis
      - industry_analysis
    output_schema: schemas/risk_analysis.schema.json

  - id: rating_committee
    name: 评级委员会意见
    type: agent
    agent: rating_committee
    depends_on:
      - financial_analysis
      - industry_analysis
      - risk_analysis
    output_schema: schemas/rating_opinion.schema.json

  - id: devil_review
    name: 反方审查
    type: agent
    agent: devil_advocate
    depends_on:
      - rating_committee
    output_schema: schemas/devil_review.schema.json

  - id: human_review
    name: 人工审核
    type: review
    depends_on:
      - rating_committee
      - devil_review

  - id: generate_report
    name: 生成 Markdown 报告草稿
    type: skill
    skill: generate_markdown_report
    depends_on:
      - human_review
